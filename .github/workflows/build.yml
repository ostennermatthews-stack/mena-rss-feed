name: Build consolidated RSS

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

concurrency:
  group: feed-update
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate feed.xml
        run: |
          python scripts/aggregate.py

      - name: Publish feed.xml to gh-pages
        run: |
          set -e

          # Prepare a clean publish dir
          mkdir -p /tmp/publish
          cp /tmp/publish/feed.xml ./feed.xml
          cp /tmp/publish/feed.xml ./feed-alt.xml

          # Switch to (or create) gh-pages branch in this checkout
          git fetch origin gh-pages || true
          git checkout gh-pages || git checkout --orphan gh-pages

          # Clear the branch contents
          git rm -rf . || true

          # Copy only what you want to publish
          cp /tmp/publish/feed.xml ./feed.xml

          # Commit and push
          git add feed.xml
          git config user.name "rss-aggregator-bot"
          git config user.email "rss-aggregator-bot@users.noreply.github.com"
          git commit -m "Update feed" || echo "No changes to commit"

          # Force-with-lease is safe here because ONLY this workflow should write gh-pages
          git push --force-with-lease origin gh-pages
