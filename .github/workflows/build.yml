name: Build consolidated RSS

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate feed.xml
        run: |
          python scripts/aggregate.py

      - name: Commit feed.xml
        run: |
          if git status --porcelain | grep -q "feed.xml"; then
            git config user.name "rss-aggregator-bot"
            git config user.email "rss-aggregator-bot@users.noreply.github.com"
            git add feed.xml
            git commit -m "Update feed"
            git push
          else
            echo "No changes."
          fi
